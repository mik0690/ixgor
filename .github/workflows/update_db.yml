name: Auto Update OS Database

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Run DistroWatch Scraper
      run: python server/scraper.py
      
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add server/database.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update OS database from DistroWatch"
        git push
